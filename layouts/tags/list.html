{{ define "main" }}
<div class="pt-32 pb-32 px-6">
  <div class="max-w-3xl mx-auto">

    <!-- ── Header ── -->
    <header class="mb-16">
      <p class="text-blue text-xs font-mono tracking-widest uppercase mb-3">Explorar por tema</p>
      <h1 class="text-4xl font-bold text-smoke">Tags</h1>
      <p class="text-muted text-sm font-mono mt-4">
        {{ len .Site.Taxonomies.tags }} temas · {{ len .Site.RegularPages }} entradas
      </p>
    </header>

    <!-- ── Tag grid ── -->
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}"
         class="group flex items-center justify-between
                bg-surface border border-zinc-900 rounded-xl px-4 py-3
                hover:border-blue/30 hover:bg-[#181c24] transition-all duration-200">

        <span class="text-sm font-mono text-muted group-hover:text-smoke transition-colors">
          #{{ .Title }}
        </span>
        <span class="text-xs font-mono text-zinc-700 group-hover:text-blue transition-colors">
          {{ len .Pages }}
        </span>

      </a>
      {{ end }}
    </div>

  </div>
</div>
{{ end }}

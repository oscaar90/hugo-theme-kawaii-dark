{{ range .Pages }}
<article class="group border-b border-zinc-900 py-8 first:pt-0">
  <a href="{{ .Permalink }}" class="block">
    <div class="flex flex-col gap-3">

      <h2 class="text-smoke font-semibold text-lg leading-snug
                 group-hover:text-blue transition-colors duration-200">
        {{ .Title }}
      </h2>

      {{ with .Params.description }}
      <p class="text-muted text-sm leading-relaxed line-clamp-2">{{ . }}</p>
      {{ end }}

      {{ if .Params.tools }}
      <div class="flex flex-wrap gap-2">
        {{ range .Params.tools }}
        <span class="text-xs font-mono text-pink/70 bg-pink/5 border border-pink/10 px-2.5 py-1 rounded-full">
          {{ . }}
        </span>
        {{ end }}
      </div>
      {{ end }}

    </div>
  </a>
</article>
{{ end }}
